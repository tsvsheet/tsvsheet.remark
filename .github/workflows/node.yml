# The JavaScript package's quality gate: eslint (complexity <= 7) and the node
# test runner at 100% line coverage of src/tsvsheet-remark. Fenced ```sheet
# blocks are computed through @tsvsheet/tsvsheet (the embedded tsvsheet.wasm),
# the shared engine — this host never reimplements it.
name: node
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
concurrency:
  group: node-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  node:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: make ci
