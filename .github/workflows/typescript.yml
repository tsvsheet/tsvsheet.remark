# Managed by nicerobot/tools.repository (distribute-build)
name: typescript
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
concurrency:
  group: typescript-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  typescript:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: nicerobot/tools.build/ci/typescript@v2
